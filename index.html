<!-- Success Celebration Micro-interaction (Hidden) -->
<div class="fixed inset-0 pointer-events-none z-50" id="confetti-container"></div>
<script>
        function switchMode(mode) {
            const hijosTab = document.getElementById('tab-hijos');
            const padresTab = document.getElementById('tab-padres');
            const hijosView = document.getElementById('view-hijos');
            const padresView = document.getElementById('view-padres');
            const socialContainer = document.getElementById('social-container');
            const card = document.getElementById('login-card');

            if (mode === 'hijos') {
                hijosTab.classList.add('bg-primary-container', 'text-white', 'shadow-sm');
                hijosTab.classList.remove('text-on-surface-variant');
                padresTab.classList.remove('bg-primary-container', 'text-white', 'shadow-sm');
                padresTab.classList.add('text-on-surface-variant');
                
                hijosView.classList.remove('hidden');
                padresView.classList.add('hidden');
                socialContainer.classList.add('hidden');
                
                // Card specific style for Hijos (slightly more playful)
                card.classList.remove('bg-white');
                card.classList.add('bg-surface-container-lowest');
            } else {
                padresTab.classList.add('bg-primary-container', 'text-white', 'shadow-sm');
                padresTab.classList.remove('text-on-surface-variant');
                hijosTab.classList.remove('bg-primary-container', 'text-white', 'shadow-sm');
                hijosTab.classList.add('text-on-surface-variant');
                
                padresView.classList.remove('hidden');
                hijosView.classList.add('hidden');
                socialContainer.classList.remove('hidden');
                
                card.classList.add('bg-white');
                card.classList.remove('bg-surface-container-lowest');
            }
        }

        // Simple scale interaction on all buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.classList.add('scale-95');
            });
            btn.addEventListener('mouseup', () => {
                btn.classList.remove('scale-95');
            });
            btn.addEventListener('mouseleave', () => {
                btn.classList.remove('scale-95');
            });
        });
    </script>
