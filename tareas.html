<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>KidUp - Mis Tareas</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#004ac6" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#dce9ff",
                        "on-error": "#ffffff",
                        "secondary-container": "#6cf8bb",
                        "tertiary-container": "#996100",
                        "tertiary-fixed-dim": "#ffb95f",
                        "surface": "#f8f9ff",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary": "#784b00",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary": "#ffffff",
                        "primary": "#004ac6",
                        "on-secondary-fixed": "#002113",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-container": "#00714d",
                        "outline": "#737686",
                        "surface-variant": "#d3e4fe",
                        "secondary-fixed": "#6ffbbe",
                        "on-background": "#0b1c30",
                        "on-tertiary-fixed": "#2a1700",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-container-low": "#eff4ff",
                        "inverse-primary": "#b4c5ff",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-tint": "#0053db",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container": "#e5eeff",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "secondary": "#006c49",
                        "on-tertiary-container": "#ffeedd",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#00174b",
                        "background": "#f8f9ff",
                        "tertiary-fixed": "#ffddb8",
                        "outline-variant": "#c3c6d7",
                        "on-surface-variant": "#434655",
                        "on-primary-container": "#eeefff",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface": "#0b1c30",
                        "primary-fixed-dim": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "primary-container": "#2563eb",
                        "inverse-surface": "#213145"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    spacing: {
                        "stack-lg": "24px",
                        "base": "8px",
                        "stack-sm": "4px",
                        "gutter": "16px",
                        "stack-md": "12px",
                        "container-padding": "20px"
                    },
                    fontFamily: {
                        "reward-display": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-lg": ["Quicksand"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Quicksand"]
                    },
                    fontSize: {
                        "reward-display": ["48px", { "lineHeight": "48px", "fontWeight": "800" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "headline-lg-mobile": ["26px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "800" }],
                        "headline-md": ["24px", { "lineHeight": "30px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
    
    <style>
        .shadow-stroke {
            box-shadow: 0 4px 0 0 rgba(0, 0, 0, 0.1);
        }
        .shadow-stroke-primary {
            box-shadow: 0 4px 0 0 #003ea8;
        }
        .shadow-stroke-secondary {
            box-shadow: 0 4px 0 0 #005236;
        }
        .card-blur {
            backdrop-filter: blur(12px);
        }
        .login-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .task-card {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 0 0 rgba(0, 0, 0, 0.05);
        }
        .task-card:active {
            transform: scale(0.97);
            box-shadow: 0 1px 0 0 rgba(0, 0, 0, 0.05);
        }
        .check-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); opacity: 1; }
        }
        .shimmer-bg {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        body {
            min-height: max(884px, 100dvh);
        }
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0b1c30;
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90%;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { background: #006c49; }
        .toast.error { background: #ba1a1a; }
        .toast.warning { background: #f59e0b; }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen pb-32">

    <div id="toast" class="toast"></div>

    <!-- Top App Bar - TU DISEÑO ORIGINAL -->
    <header class="w-full top-0 sticky z-50 bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline flex justify-between items-center px-gutter py-stack-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary">
                <img id="child-avatar" class="w-full h-full object-cover" 
                     src="https://lh3.googleusercontent.com/aida-public/AB6AXuCVQeV6rTRSKRSeFlHX9FKKybdBcRyjcrfTDMDbLz82_pMh4vyWiJ7cY50G4P3QgEIP0glqbf5YSqTXAnojvt1CMgYd1Gzkciv2WoyniVcTcKcIrgK8SWNbURJVFxhYpfY-er2L_mwQhB4AMWbGfeZdE0zo7gXh-LBQ2gL-Qu1lQKZmY9YKBQGZ-pPlN_CY6H3nNZ1z6xW6S95ftukdXv6g_QP31KXFImgXqfPXusx7Z37QJOMO0k8ajGmP_0ds8dITwXFGyxto" 
                     alt="Avatar" />
            </div>
            <h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim">Responsibility Coach</h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="bg-primary-container text-white px-3 py-1 rounded-full text-sm font-bold" id="time-earned-display">0m</span>
            <button onclick="logout()" class="material-symbols-outlined text-primary dark:text-primary-fixed-dim p-2 hover:bg-surface-container-high transition-colors rounded-full">logout</button>
        </div>
    </header>

    <main class="px-gutter pt-stack-lg max-w-md mx-auto">
        <!-- Hero Section / Time Earned - TU DISEÑO ORIGINAL -->
        <section class="mb-stack-lg bg-primary-container rounded-xl p-stack-lg text-on-primary-container relative overflow-hidden shadow-lg">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <span class="material-symbols-outlined text-[120px]">timer</span>
            </div>
            <div class="relative z-10">
                <p class="font-label-caps text-label-caps opacity-90 mb-1">TIME EARNED TODAY</p>
                <div class="flex items-baseline gap-2">
                    <span class="font-reward-display text-reward-display" id="total-time-display">0m</span>
                    <span class="font-body-md opacity-80">/ <span id="time-limit-display">2h</span> Goal</span>
                </div>
                <div class="mt-stack-md h-3 w-full bg-on-primary-container/20 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-secondary-fixed rounded-full w-0 relative overflow-hidden">
                        <div class="absolute inset-0 shimmer-bg"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Task List Header - TU DISEÑO ORIGINAL -->
        <div class="flex justify-between items-end mb-stack-md">
            <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Daily Tasks</h2>
            <p class="text-on-surface-variant font-body-md" id="tasks-left">0 Tasks left</p>
        </div>

        <!-- Task Grid - TU DISEÑO ORIGINAL -->
        <div id="task-list" class="grid grid-cols-1 gap-4">
            <!-- Generado por JavaScript -->
        </div>
    </main>

    <!-- Bottom Nav Bar - TU DISEÑO ORIGINAL -->
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-gutter pb-6 pt-2 bg-surface-container dark:bg-inverse-surface shadow-[0_-4px_10px_rgba(0,0,0,0.08)] rounded-t-2xl">
        <button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-4 py-2" onclick="window.location.href='tareas.html'">
            <span class="material-symbols-outlined">checklist</span>
            <span class="font-label-caps text-label-caps mt-1">Tasks</span>
        </button>
        <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-container-highest transition-all rounded-xl" onclick="window.location.href='tienda.html'">
            <span class="material-symbols-outlined">storefront</span>
            <span class="font-label-caps text-label-caps mt-1">Tienda</span>
        </button>
        <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-container-highest transition-all rounded-xl" onclick="window.location.href='panel.html'">
            <span class="material-symbols-outlined">supervisor_account</span>
            <span class="font-label-caps text-label-caps mt-1">Parents</span>
        </button>
        <button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-container-highest transition-all rounded-xl" onclick="window.location.href='historial.html'">
            <span class="material-symbols-outlined">history</span>
            <span class="font-label-caps text-label-caps mt-1">History</span>
        </button>
    </nav>

    <!-- Floating Action Button - TU DISEÑO ORIGINAL -->
    <div class="fixed right-6 bottom-24 z-40">
        <button class="w-14 h-14 bg-tertiary text-white rounded-2xl shadow-xl border-b-4 border-on-tertiary-fixed-variant flex items-center justify-center active:translate-y-1 active:border-b-0 transition-all" onclick="window.location.href='tienda.html'">
            <span class="material-symbols-outlined text-3xl">emoji_events</span>
        </button>
    </div>

    <script>
        // ============================================================
        // ESTADO
        // ============================================================
        const state = {
            userName: localStorage.getItem('kidup_user') || 'Sofía',
            userLevel: parseInt(localStorage.getItem('kidup_level')) || 1,
            totalTime: parseInt(localStorage.getItem('kidup_time')) || 0,
            timeLimit: parseInt(localStorage.getItem('kidup_time_limit')) || 120,
            tasks: [],
            completedIds: JSON.parse(localStorage.getItem('kidup_completed_ids')) || []
        };

        // ============================================================
        // CARGAR TAREAS
        // ============================================================
        function loadTasks() {
            const saved = localStorage.getItem('kidup_tasks');
            if (saved) {
                try {
                    state.tasks = JSON.parse(saved);
                } catch(e) {
                    state.tasks = [];
                }
            } else {
                state.tasks = [];
            }
        }

        // ============================================================
        // ACTUALIZAR UI - MANTIENE TU DISEÑO
        // ============================================================
        function updateUI() {
            loadTasks();
            
            // Filtrar tareas
            const available = state.tasks.filter(t => 
                t.status === 'available' && !state.completedIds.includes(t.id)
            );
            const pending = state.tasks.filter(t => 
                t.status === 'pending' && !state.completedIds.includes(t.id)
            );
            const completed = state.tasks.filter(t => 
                state.completedIds.includes(t.id)
            );
            
            // Actualizar avatar
            const avatarImg = document.getElementById('child-avatar');
            if (state.userName === 'Sofía') {
                avatarImg.src = 'https://lh3.googleusercontent.com/aida-public/AB6AXuCVQeV6rTRSKRSeFlHX9FKKybdBcRyjcrfTDMDbLz82_pMh4vyWiJ7cY50G4P3QgEIP0glqbf5YSqTXAnojvt1CMgYd1Gzkciv2WoyniVcTcKcIrgK8SWNbURJVFxhYpfY-er2L_mwQhB4AMWbGfeZdE0zo7gXh-LBQ2gL-Qu1lQKZmY9YKBQGZ-pPlN_CY6H3nNZ1z6xW6S95ftukdXv6g_QP31KXFImgXqfPXusx7Z37QJOMO0k8ajGmP_0ds8dITwXFGyxto';
            } else if (state.userName === 'Mateo') {
                avatarImg.src = 'https://lh3.googleusercontent.com/aida-public/AB6AXuAJxSkZzjcGTL13TG2HfEqcLHUFXxdrO9oGaVvl2E0IhbVQ128thybpIpf2dFVVSKOVMG_HPYG3fRJan0_RzgDNyaNbFXv5seyJdxAm-WOE7Q6SE6dCVOm_4phMQLeAIZ-qjfdCOAqBtxboItVGgq2wqBhw8m2OHW3DXGS-sJifwXurppJdQnR7MILAnuO7c0ed_HZHel7vQIvgv5j-o2E9TOQDkg2wXCvmm5k5-PO5dLdB1nceEl7IicKLJi3euuPHdfWsXXel';
            }
            
            // Tiempo
            document.getElementById('total-time-display').textContent = formatTime(state.totalTime);
            document.getElementById('time-earned-display').textContent = formatTime(state.totalTime);
            document.getElementById('time-limit-display').textContent = formatTime(state.timeLimit);
            
            const pct = Math.min((state.totalTime / state.timeLimit) * 100, 100);
            document.getElementById('progress-bar').style.width = pct + '%';
            
            // Contador
            document.getElementById('tasks-left').textContent = available.length + ' Tasks left';
            
            // Renderizar tareas - MANTIENE TU DISEÑO
            renderTasks(available, pending, completed);
        }

        // ============================================================
        // RENDERIZAR TAREAS - CON TU DISEÑO ORIGINAL
        // ============================================================
        function renderTasks(available, pending, completed) {
            const list = document.getElementById('task-list');
            
            if (state.tasks.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 bg-surface-container rounded-2xl">
                        <span class="material-symbols-outlined text-6xl text-outline">inbox</span>
                        <p class="text-on-surface-variant mt-4 font-bold">No hay tareas aún</p>
                        <p class="text-sm text-outline mt-2">Pídele a tus padres que creen tareas para ti.</p>
                        <button onclick="window.location.href='panel.html'" 
                                class="mt-4 bg-primary text-white px-6 py-3 rounded-xl font-bold shadow-stroke-primary hover:brightness-110 transition-all">
                            Ir a Panel de Padres
                        </button>
                    </div>
                `;
                return;
            }
            
            if (available.length === 0 && pending.length === 0 && completed.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 bg-surface-container rounded-2xl">
                        <span class="material-symbols-outlined text-6xl text-secondary">celebration</span>
                        <p class="text-on-surface-variant mt-4 font-bold">¡Todas las tareas completadas!</p>
                        <p class="text-sm text-outline">Vuelve mañana por más.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            // Tareas disponibles - CON TU DISEÑO ORIGINAL
            available.forEach(t => {
                html += `
                    <div class="task-card bg-surface-container-lowest border border-outline-variant p-4 rounded-xl flex items-center gap-4 hover:border-primary transition-all">
                        <button onclick="completeTask(${t.id}, this)" class="w-12 h-12 rounded-xl border-2 border-outline-variant flex items-center justify-center group active:scale-90 transition-transform bg-surface">
                            <span class="material-symbols-outlined text-transparent group-hover:text-outline-variant select-none">check</span>
                        </button>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-body-lg text-body-lg text-on-surface">${t.name}</h3>
                                <span class="bg-tertiary-fixed text-on-tertiary-fixed px-2 py-0.5 rounded-lg text-[12px] font-bold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[14px]">schedule</span>
                                    +${t.reward}m
                                </span>
                            </div>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                                <p class="text-[14px] text-primary font-bold uppercase tracking-wider">Available</p>
                            </div>
                            ${t.priority === 'urgent' ? '<span class="text-xs text-warning font-bold ml-2">🔴 URGENTE</span>' : ''}
                        </div>
                    </div>
                `;
            });
            
            // Tareas pendientes - CON TU DISEÑO ORIGINAL
            pending.forEach(t => {
                html += `
                    <div class="task-card bg-surface-container border border-outline-variant p-4 rounded-xl flex items-center gap-4 opacity-80">
                        <div class="w-12 h-12 rounded-xl bg-surface-container-high flex items-center justify-center text-on-surface-variant">
                            <span class="material-symbols-outlined">hourglass_empty</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-body-lg text-body-lg text-on-surface">${t.name}</h3>
                                <span class="bg-tertiary-fixed text-on-tertiary-fixed px-2 py-0.5 rounded-lg text-[12px] font-bold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[14px]">schedule</span>
                                    +${t.reward}m
                                </span>
                            </div>
                            <div class="flex items-center gap-2 mt-1 text-on-surface-variant">
                                <p class="text-[14px] font-bold uppercase tracking-wider">Pending Approval</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            // Tareas completadas - CON TU DISEÑO ORIGINAL
            completed.forEach(t => {
                html += `
                    <div class="task-card bg-secondary-container/20 border border-secondary p-4 rounded-xl flex items-center gap-4 opacity-70">
                        <div class="w-12 h-12 rounded-xl bg-secondary flex items-center justify-center text-white">
                            <span class="material-symbols-outlined">check_circle</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-body-lg text-body-lg text-on-surface line-through">${t.name}</h3>
                                <span class="bg-secondary text-white px-2 py-0.5 rounded-lg text-[12px] font-bold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-[14px]">check</span>
                                    +${t.reward}m
                                </span>
                            </div>
                            <div class="flex items-center gap-2 mt-1 text-secondary">
                                <p class="text-[14px] font-bold uppercase tracking-wider">✅ Completed</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }

        // ============================================================
        // COMPLETAR TAREA
        // ============================================================
        function completeTask(taskId, btn) {
            const task = state.tasks.find(t => t.id === taskId);
            if (!task || state.completedIds.includes(taskId)) return;
            
            // Cambiar a pendiente
            task.status = 'pending';
            localStorage.setItem('kidup_tasks', JSON.stringify(state.tasks));
            
            // Efecto visual
            const card = btn.closest('.task-card');
            btn.classList.add('bg-secondary', 'border-secondary');
            btn.querySelector('.material-symbols-outlined').classList.add('text-white', 'check-pop');
            btn.querySelector('.material-symbols-outlined').classList.remove('text-transparent');
            
            setTimeout(() => {
                card.style.opacity = '0.6';
                card.style.transform = 'scale(0.98)';
            }, 300);
            
            setTimeout(() => {
                updateUI();
                showToast(`⏳ "${task.name}" enviada a aprobación`, '');
            }, 600);
        }

        // ============================================================
        // UTILIDADES
        // ============================================================
        function formatTime(minutes) {
            if (minutes < 60) return minutes + 'm';
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return h + 'h ' + m + 'm';
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 10);
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function logout() {
            localStorage.removeItem('kidup_user');
            localStorage.removeItem('kidup_user_type');
            window.location.href = 'index.html';
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        if (!localStorage.getItem('kidup_user')) {
            window.location.href = 'index.html';
        }
        
        // Si no hay tareas, crear algunas de ejemplo
        if (!localStorage.getItem('kidup_tasks')) {
            const defaultTasks = [
                { id: 1, name: '📚 Hacer la tarea del colegio', reward: 20, status: 'available', priority: 'urgent' },
                { id: 2, name: '🧹 Barrer la cocina', reward: 15, status: 'available', priority: 'normal' },
                { id: 3, name: '🛏️ Hacer la cama', reward: 10, status: 'available', priority: 'normal' },
            ];
            localStorage.setItem('kidup_tasks', JSON.stringify(defaultTasks));
        }
        
        loadTasks();
        updateUI();
        
        // Actualizar cada 5 segundos
        setInterval(updateUI, 5000);
    </script>
</body>
</html>
